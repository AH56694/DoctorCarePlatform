events {}

http {
  upstream backend {
    server backend:8000;
  }

  upstream ai_service {
    server ai-service:8100;
  }

  server {
    listen 80;

    location /api/ {
      proxy_pass http://backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /ai-api/ {
      rewrite ^/ai-api/(.*)$ /api/v1/$1 break;
      proxy_pass http://ai_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
      proxy_pass http://frontend;
    }
  }
}
