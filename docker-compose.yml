name: doctorcareplatform

services:
  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      PROJECT_NAME: ${PROJECT_NAME:-DoctorCarePlatform}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://medical_app:change-me@postgres:5432/doctor_care_platform}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai-service:8100}
      ALIYUN_SMS_ACCESS_KEY_ID: ${ALIYUN_SMS_ACCESS_KEY_ID:-}
      ALIYUN_SMS_ACCESS_KEY_SECRET: ${ALIYUN_SMS_ACCESS_KEY_SECRET:-}
      ALIYUN_SMS_SIGN_NAME: ${ALIYUN_SMS_SIGN_NAME:-}
      ALIYUN_SMS_TEMPLATE_CODE: ${ALIYUN_SMS_TEMPLATE_CODE:-}
    depends_on:
      - postgres
      - redis
      - minio
      - ai-service
    ports:
      - "8000:8000"

  ai-service:
    build:
      context: .
      dockerfile: ai-service/Dockerfile
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      EMBEDDING_SERVICE_URL: ${EMBEDDING_SERVICE_URL:-http://embedding-service:8200}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-deepseek-chat}
      INTENT_CONFIDENCE_THRESHOLD: ${INTENT_CONFIDENCE_THRESHOLD:-0.6}
    depends_on:
      - postgres
      - redis
      - embedding-service
    ports:
      - "8100:8100"

  embedding-service:
    build:
      context: .
      dockerfile: embedding-service/Dockerfile
    environment:
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-bge-base-zh-v1.5}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-768}
    ports:
      - "8200:8200"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - backend
      - ai-service
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-doctor_care_platform}
      POSTGRES_USER: ${POSTGRES_USER:-medical_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/10-init.sql:ro

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
